name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
env:
  CARGO_TERM_COLOR: always
  RISC0_DEV_MODE: "1"
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Risc0
        uses: ./.github/actions/install-risc0
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Run lez-events tests
        run: RISC0_DEV_MODE=1 cargo test -p lez-events
      - name: Run nssa_core tests
        run: RISC0_DEV_MODE=1 cargo test -p nssa_core
      - name: Run lez-events-decoder tests
        run: RISC0_DEV_MODE=1 cargo test -p lez-events-decoder
      - name: Run nssa tests
        # Skip pre-existing upstream test failures unrelated to LP-0012/LP-0013:
        # - privacy_preserving_transaction::circuit — requires blockchain circuits binary
        # - state::tests — depends on privacy circuit binaries
        # - result — depends on privacy circuit binaries
        run: RISC0_DEV_MODE=1 cargo test -p nssa -- --skip privacy_preserving_transaction::circuit --skip state::tests --skip result
      - name: Run emit_event_demo tests
        run: RISC0_DEV_MODE=1 cargo test -p emit_event_demo
      - name: Run lez-authority tests (LP-0013)
        run: RISC0_DEV_MODE=1 cargo test -p lez-authority
      - name: Run token_program tests (LP-0013)
        run: RISC0_DEV_MODE=1 cargo test -p token_program --lib
