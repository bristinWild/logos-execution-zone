name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RISC0_DEV_MODE: "1"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Risc0
        uses: ./.github/actions/install-risc0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run lez-events tests
        run: RISC0_DEV_MODE=1 cargo test -p lez-events

      - name: Run nssa_core tests
        run: RISC0_DEV_MODE=1 cargo test -p nssa_core

      - name: Run lez-events-decoder tests
        run: RISC0_DEV_MODE=1 cargo test -p lez-events-decoder

      - name: Run nssa tests
        run: RISC0_DEV_MODE=1 cargo test -p nssa

      - name: Run emit_event_demo tests
        run: RISC0_DEV_MODE=1 cargo test -p emit_event_demo
