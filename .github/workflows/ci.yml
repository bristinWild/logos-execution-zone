name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RISC0_DEV_MODE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Risc0
        run: |
          curl -L https://risczero.com/install | bash
          source ~/.bashrc
          rzup install

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: RISC0_DEV_MODE=1 cargo build --workspace 2>&1

      - name: Run event system tests
        run: |
          RISC0_DEV_MODE=1 cargo test -p lez-events
          RISC0_DEV_MODE=1 cargo test -p nssa_core
          RISC0_DEV_MODE=1 cargo test -p nssa
          RISC0_DEV_MODE=1 cargo test -p sequencer_core
          RISC0_DEV_MODE=1 cargo test -p lez-events-decoder
          RISC0_DEV_MODE=1 cargo test -p emit_event_demo

  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check -p lez-events -p lez-events-decoder
