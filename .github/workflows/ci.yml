name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RISC0_DEV_MODE: "1"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Risc0
        run: |
          curl -L https://risczero.com/install | bash
          echo "$HOME/.risc0/bin" >> $GITHUB_PATH
          $HOME/.risc0/bin/rzup install || true

      - name: Install rzup and toolchain
        run: |
          export PATH="$HOME/.risc0/bin:$PATH"
          rzup install

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run event system tests
        run: |
          RISC0_DEV_MODE=1 cargo test -p lez-events
          RISC0_DEV_MODE=1 cargo test -p nssa_core
          RISC0_DEV_MODE=1 cargo test -p sequencer_core
          RISC0_DEV_MODE=1 cargo test -p lez-events-decoder

      - name: Run nssa tests
        run: RISC0_DEV_MODE=1 cargo test -p nssa

      - name: Run demo tests
        run: RISC0_DEV_MODE=1 cargo test -p emit_event_demo
