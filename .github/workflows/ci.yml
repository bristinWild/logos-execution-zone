name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RISC0_DEV_MODE: "1"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Risc0
        uses: ./.github/actions/install-risc0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run lez-events tests
        run: RISC0_DEV_MODE=1 cargo test -p lez-events -- --test-threads=1

      - name: Run nssa_core tests
        run: RISC0_DEV_MODE=1 cargo test -p nssa_core

      - name: Run lez-events-decoder tests
        run: RISC0_DEV_MODE=1 cargo test -p lez-events-decoder

      - name: Run nssa tests
        run: RISC0_DEV_MODE=1 cargo test -p nssa

      - name: Run emit_event_demo tests
        run: RISC0_DEV_MODE=1 cargo test -p emit_event_demo
      - name: Check TOML files are formatted
        run: taplo fmt --check .

  machete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}

      - name: Install active toolchain
        run: rustup install

      - name: Install cargo-machete
        run: cargo install cargo-machete

      - name: Check for unused dependencies
        run: cargo machete

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: Check licenses and advisories
        run: cargo deny check

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    name: lint
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}

      - uses: ./.github/actions/install-system-deps

      - uses: ./.github/actions/install-risc0

      - uses: ./.github/actions/install-logos-blockchain-circuits
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install active toolchain
        run: rustup install

      - name: Lint workspace
        env:
          RISC0_SKIP_BUILD: "1"
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Lint programs
        env:
          RISC0_SKIP_BUILD: "1"
        run: cargo clippy -p "*programs" -- -D warnings

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}

      - uses: ./.github/actions/install-system-deps

      - uses: ./.github/actions/install-risc0

      - uses: ./.github/actions/install-logos-blockchain-circuits
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install active toolchain
        run: rustup install

      - name: Install nextest
        run: cargo install --locked cargo-nextest

      - name: Run tests
        env:
          RISC0_DEV_MODE: "1"
          RUST_LOG: "info"
        run: cargo nextest run --workspace --exclude integration_tests

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}

      - uses: ./.github/actions/install-system-deps

      - uses: ./.github/actions/install-risc0

      - uses: ./.github/actions/install-logos-blockchain-circuits
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install active toolchain
        run: rustup install

      - name: Install nextest
        run: cargo install --locked cargo-nextest

      - name: Run tests
        env:
          RISC0_DEV_MODE: "1"
          RUST_LOG: "info"
        run: cargo nextest run -p integration_tests -- --skip tps_test --skip indexer

  # # TODO: Bring this back once we find the source of the errors.
  # #
  # integration-tests-indexer:
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 60
  #   steps:
  #     - uses: actions/checkout@v5
  #       with:
  #         ref: ${{ github.head_ref }}

  #     - uses: ./.github/actions/install-system-deps

  #     - uses: ./.github/actions/install-risc0

  #     - uses: ./.github/actions/install-logos-blockchain-circuits
  #       with:
  #         github-token: ${{ secrets.GITHUB_TOKEN }}

  #     - name: Install active toolchain
  #       run: rustup install

  #     - name: Install nextest
  #       run: cargo install --locked cargo-nextest

  #     - name: Run tests
  #       env:
  #         RISC0_DEV_MODE: "1"
  #         RUST_LOG: "info"
  #       run: cargo nextest run -p integration_tests indexer -- --skip tps_test 

  valid-proof-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}

      - uses: ./.github/actions/install-system-deps

      - uses: ./.github/actions/install-risc0

      - uses: ./.github/actions/install-logos-blockchain-circuits
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install active toolchain
        run: rustup install

      - name: Test valid proof
        env:
          RUST_LOG: "info"
        run: cargo test -p integration_tests -- --exact private::private_transfer_to_owned_account

  artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    name: artifacts
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}

      - uses: ./.github/actions/install-risc0

      - name: Install just
        run: cargo install just

      - name: Build artifacts
        run: just build-artifacts

      - name: Check if artifacts match repository
        run: |
          if ! git diff --exit-code artifacts/; then
            echo "❌ Artifacts in the repository are out of date!"
            echo "Please run 'just build-artifacts' and commit the changes."
            exit 1
          fi
          echo "✅ Artifacts are up to date"
