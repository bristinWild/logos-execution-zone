[advisories]
ignore = [
    { id = "RUSTSEC-2023-0071", reason = "upstream dependency, not directly used" },
    { id = "RUSTSEC-2023-0089", reason = "upstream dependency, not directly used" },
    { id = "RUSTSEC-2024-0357", reason = "rustls-pemfile unmaintained but safe" },
    { id = "RUSTSEC-2024-0388", reason = "upstream dependency, not directly used" },
    { id = "RUSTSEC-2024-0436", reason = "upstream dependency, not directly used" },
    { id = "RUSTSEC-2025-0055", reason = "upstream dependency, not directly used" },
    { id = "RUSTSEC-2025-0134", reason = "upstream dependency, not directly used" },
    { id = "RUSTSEC-2025-0141", reason = "upstream dependency, not directly used" },
]

[licenses]
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
    "Zlib",
    "0BSD",
    "blessing",
    "LicenseRef-ring",
    "CDLA-Permissive-2.0",
    "LGPL-3.0-or-later",
    "LGPL-3.0-only",
    "BSL-1.0",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
